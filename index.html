<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insulin Risk AI</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#e8f0ff,#f8fbff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:420px;
    background:white;
    padding:30px;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h1{
    margin-top:0;
    color:#1f2937;
}

.subtitle{
    color:#6b7280;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    padding:18px;
    border-radius:16px;
    display:none;
}

.safe{
    background:#dcfce7;
    color:#166534;
}

.danger{
    background:#fee2e2;
    color:#991b1b;
}

.loading{
    background:#dbeafe;
    color:#1e40af;
}

.percent{
    font-size:28px;
    font-weight:bold;
    margin:10px 0;
}

ul{
    padding-left:20px;
}
</style>

</head>

<body>

<div class="card">

    <h1>Insulin Risk AI</h1>

    <div class="subtitle">
        저혈당 위험 예측 시스템
    </div>

    <label>혈당 (mg/dL)</label>
    <input id="glucose" type="number" placeholder="예: 120">

    <label>공복 시간 (시간)</label>
    <input id="fasting_hours" type="number" placeholder="예: 2">

    <label>인슐린 용량 (Unit)</label>
    <input id="insulin_units" type="number" placeholder="예: 4">

    <label>체중 (kg)</label>
    <input id="weight" type="number" placeholder="예: 70">

    <button onclick="predictRisk()">
        위험도 예측하기
    </button>

    <div id="resultBox" class="result">

        <div id="message"></div>

        <div id="percent" class="percent"></div>

        <ul id="reasons"></ul>

    </div>

</div>

<script>

async function predictRisk(){

    const box = document.getElementById("resultBox");
    const message = document.getElementById("message");
    const percent = document.getElementById("percent");
    const reasons = document.getElementById("reasons");

    box.style.display = "block";
    box.className = "result loading";

    message.textContent =
    "예측 중입니다... (Render 무료 서버는 처음에 30~60초 걸릴 수 있습니다)";

    percent.textContent = "";
    reasons.innerHTML = "";

    const data = {
        glucose:Number(document.getElementById("glucose").value),
        fasting_hours:Number(document.getElementById("fasting_hours").value),
        insulin_units:Number(document.getElementById("insulin_units").value),
        weight:Number(document.getElementById("weight").value)
    };

    try{

        const response = await fetch(
            "https://ai-c98q.onrender.com/predict",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(data)
            }
        );

        const result = await response.json();

        box.className =
            "result " +
            (result.risk_result === "O"
                ? "danger"
                : "safe");

        message.textContent = result.message;

        percent.textContent =
            result.ai_percent + "%";

        reasons.innerHTML = "";

        if(result.reasons){
            result.reasons.forEach(reason=>{
                const li=document.createElement("li");
                li.textContent=reason;
                reasons.appendChild(li);
            });
        }

    }catch(error){

        box.className = "result danger";

        message.textContent =
            "서버 연결 실패";

        percent.textContent = "";

        reasons.innerHTML =
            "<li>Render 서버가 꺼져있거나 CORS 오류일 수 있습니다.</li>";
    }
}

</script>

</body>
</html>
